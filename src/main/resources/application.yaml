spring:
  application:
    name: nbc-checkout-system
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:file:./testdb;MODE=MySQL;AUTO_SERVER=TRUE
    username: user
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: create
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    defer-datasource-initialization: true
  sql:
    init:
      mode: always
jwt:
  secret:
    key: ${JWT_SECRET}